<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>커핑 검사 결과 입력기</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#9333ea">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .active-btn { background-color: #9333ea !important; color: white !important; border-color: #9333ea !important; }
  .accordion-content { transition: max-height 0.3s ease-out; overflow: hidden; }
  .accordion-content.closed { max-height: 0 !important; padding-top: 0 !important; padding-bottom: 0 !important; }
</style>
</head>
<body class="bg-gray-50 min-h-screen pb-20 font-sans text-gray-800">

<script>
// 🛑 [필수 설정] 구글 앱스 스크립트 웹앱 주소
const GOOGLE_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxMfxfSapv5-_MkX0YVb5p1N3UwUz9mnLspWo6IrfPC7vmK9RTjY6733ObZhE2v489H/exec";

// 🛑 [상태 관리] 현재 선택된 임시저장건의 시트 행 번호 및 캐시
let currentDraftRowId = null;
let loadedDraftsCache = [];
</script>

<!-- 상단 헤더 -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center bg-white p-3 shadow-sm border-b border-gray-200">
  <div class="flex items-center gap-2">
    <div class="h-8 w-8 bg-purple-100 rounded-lg flex items-center justify-center text-purple-600 font-bold text-lg">☕</div>
    <div>
      <h1 class="text-sm font-bold text-gray-900 leading-tight">커핑 검사 결과 입력기</h1>
      <p class="text-[10px] text-gray-400 font-mono">Cafe Nogales QC System</p>
    </div>
  </div>
</header>
<div class="h-16"></div>

<div class="max-w-md mx-auto px-4 pt-4" id="app-container">

  <!-- 임시저장 패널 -->
  <div class="mb-5 bg-purple-50 border border-purple-200 p-4 rounded-xl flex items-center justify-between gap-3 shadow-sm">
    <div class="flex-1">
      <label class="block text-xs font-bold text-purple-800 mb-1">📂 진행 중인 임시저장 불러오기</label>
      <select id="draftSelect" onchange="loadSelectedDraft(this.value)" class="w-full bg-white border border-purple-200 rounded-lg p-2 text-xs focus:outline-none">
        <option value="">-- 새로 작성하기 --</option>
      </select>
    </div>
  </div>
  
  <!-- 모드 전환 탭 -->
  <div class="flex mb-4 bg-gray-200 rounded-lg p-1">
    <button type="button" id="tab-single" onclick="switchMode('single')" class="flex-1 py-2 text-sm font-bold rounded-md bg-white shadow text-purple-700 transition-all">단일 폼 (모바일)</button>
    <button type="button" id="tab-multi" onclick="switchMode('multi')" class="flex-1 py-2 text-sm font-bold rounded-md text-gray-500 hover:text-gray-700 transition-all">다중 일괄 폼 (태블릿)</button>
  </div>

  <!-- 다중 폼 (태블릿) -->
  <form id="multiCuppingForm" class="hidden space-y-4">
    <div class="bg-white p-3 rounded-xl shadow-sm border flex flex-wrap items-center justify-between gap-2">
      <div class="flex items-center gap-3">
        <label class="text-xs font-bold text-gray-700">샘플 수</label>
        <select id="multiSampleCount" onchange="renderMultiGrid()" class="border rounded-lg p-1.5 text-xs bg-gray-50 font-bold">
          <option value="5">5개</option>
          <option value="6" selected>6개 (기본)</option>
          <option value="7">7개</option>
          <option value="8">8개</option>
          <option value="9">9개</option>
          <option value="10">10개 (최대)</option>
        </select>
        <button type="button" onclick="copySample1Info()" class="px-3 py-1.5 bg-purple-100 text-purple-700 font-bold text-xs rounded-lg hover:bg-purple-200">
          📋 1번 샘플 기본정보 전체 적용
        </button>
      </div>
      
      <div class="flex items-center gap-2">
        <button type="button" onclick="openMultiDraftModal()" class="px-3 py-2 bg-blue-600 text-white font-bold text-xs rounded-lg shadow active:scale-95">
          📂 다중 불러오기
        </button>
        <button type="button" onclick="saveMultiDrafts()" class="px-3 py-2 bg-amber-500 text-white font-bold text-xs rounded-lg shadow active:scale-95">
          💾 다중 일괄 저장
        </button>
        <button type="button" onclick="submitMultiForm()" class="px-3 py-2 bg-purple-600 text-white font-bold text-xs rounded-lg shadow active:scale-95">
          🚀 다중 일괄 검사 완료
        </button>
      </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-x-auto">
      <div id="multiGridContainer" class="p-3 min-w-[1000px] space-y-6">
        <!-- JS 동적 생성 -->
      </div>
    </div>
  </form>
  
  <!-- 단일 폼 (모바일) -->
  <form id="cuppingForm" class="space-y-4">
    
    <!-- Group 1: 기본 정보 -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <button type="button" class="w-full px-4 py-3 bg-gray-50 flex justify-between font-bold text-sm border-b" onclick="toggleAcc(this)">
        <span>1. 기본 정보</span> <span class="arrow text-gray-400">▲</span>
      </button>
      <div class="accordion-content p-4 space-y-3">
        <div><label class="block text-xs font-semibold mb-1">Coffee Name</label><input type="text" id="cup_name" class="w-full p-2 border rounded-lg text-sm bg-gray-50"></div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="block text-xs font-semibold mb-1">Lot Code</label><input type="text" id="cup_lotCode" class="w-full p-2 border rounded-lg text-sm"></div>
          <div><label class="block text-xs font-semibold mb-1">Lot Number</label><input type="text" id="cup_lotNum" class="w-full p-2 border rounded-lg text-sm"></div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="block text-xs font-semibold mb-1">Cupping Date</label><input type="date" id="cup_date" class="w-full p-2 border rounded-lg text-sm"></div>
          <div><label class="block text-xs font-semibold mb-1">Roasting Profile</label><input type="text" id="cup_roastProfile" class="w-full p-2 border rounded-lg text-sm"></div>
        </div>
        <div>
          <label class="block text-xs font-semibold mb-1">Roaster</label>
          <div class="grid grid-cols-2 gap-1.5" id="group_roaster">
            <button type="button" class="select-single py-2 text-xs border rounded-lg bg-gray-50">Ikawa V3</button>
            <button type="button" class="select-single py-2 text-xs border rounded-lg bg-gray-50">Ikawa Pro 100</button>
            <button type="button" class="select-single py-2 text-xs border rounded-lg bg-gray-50">Probat Sample Roaster</button>
            <button type="button" class="select-single py-2 text-xs border rounded-lg bg-gray-50">Easyster</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Group 2: 디펙트 -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <button type="button" class="w-full px-4 py-3 bg-gray-50 flex justify-between font-bold text-sm border-b" onclick="toggleAcc(this)">
        <span>2. 디펙트 (Defects)</span> <span class="arrow text-gray-400">▲</span>
      </button>
      <div class="accordion-content p-4 space-y-4" id="defect-container">
        <!-- JS 동적 렌더링 -->
      </div>
    </div>

    <!-- Group 3: 센서리 점수 평가 -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <button type="button" class="w-full px-4 py-3 bg-purple-50 flex justify-between font-bold text-sm border-b border-purple-100 text-purple-900" onclick="toggleAcc(this)">
        <span>3. 센서리 점수 (Score)</span> <span class="arrow text-gray-400">▲</span>
      </button>
      <div class="accordion-content p-4 space-y-1">
        <div id="score-container" class="space-y-1"></div>
        <div class="mt-4 pt-3 border-t border-purple-200 flex justify-between items-center bg-purple-100 p-3 rounded-lg">
          <span class="font-bold text-purple-900 text-sm">Total Score (합계 + 36)</span>
          <span id="cup_total_score" class="font-bold text-2xl text-purple-700">84.00</span>
        </div>
      </div>
    </div>

    <!-- Group 4: 향미 상세 -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <button type="button" class="w-full px-4 py-3 bg-gray-50 flex justify-between font-bold text-sm border-b" onclick="toggleAcc(this)">
        <span>4. 향미 상세 (Notes & Intensity)</span> <span class="arrow text-gray-400">▲</span>
      </button>
      <div class="accordion-content p-4 space-y-6">
        
        <!-- Flavour -->
        <div class="border-b pb-4">
          <h4 class="text-sm font-bold text-gray-800 mb-2 border-l-4 border-blue-500 pl-2">Flavour</h4>
          <label class="block text-[10px] font-semibold text-gray-500 mb-1">Intensity</label>
          <div class="grid grid-cols-5 gap-1 mb-3" id="grp_fl_int">
            <button type="button" class="select-single py-1.5 text-[10px] border rounded bg-gray-50">Low</button>
            <button type="button" class="select-single py-1.5 text-[10px] border rounded bg-gray-50">Medium-Low</button>
            <button type="button" class="select-single py-1.5 text-[10px] border rounded bg-gray-50">Medium</button>
            <button type="button" class="select-single py-1.5 text-[10px] border rounded bg-gray-50">Medium-High</button>
            <button type="button" class="select-single py-1.5 text-[10px] border rounded bg-gray-50">High</button>
          </div>
          <div class="space-y-2">
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-1">Top Notes</label>
              <textarea id="cup_fl_top" rows="2" class="w-full p-2 border rounded text-xs bg-gray-50 resize-none overflow-y-auto"></textarea>
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-1">Extra Notes</label>
              <textarea id="cup_fl_extra" rows="2" class="w-full p-2 border rounded text-xs bg-gray-50 resize-none overflow-y-auto"></textarea>
            </div>
            <div>
              <label class="block text-xs font-semibold text-red-600 mb-1">Negative Notes</label>
              <textarea id="cup_fl_neg" rows="2" class="w-full p-2 border border-red-200 bg-red-50 rounded text-xs text-red-800 resize-none overflow-y-auto"></textarea>
            </div>
          </div>
        </div>

        <!-- Aftertaste -->
        <div class="border-b pb-4">
          <h4 class="text-sm font-bold text-gray-800 mb-2 border-l-4 border-blue-500 pl-2">Aftertaste</h4>
          <label class="block text-[10px] font-semibold text-gray-500 mb-1">Intensity</label>
          <div class="grid grid-cols-5 gap-1 mb-3" id="grp_af_int">
            <button type="button" class="select-single py-1.5 text-[10px] border rounded bg-gray-50">Short</button>
            <button type="button" class="select-single py-1.5 text-[10px] border rounded bg-gray-50">Medium-Short</button>
            <button type="button" class="select-single py-1.5 text-[10px] border rounded bg-gray-50">Medium</button>
            <button type="button" class="select-single py-1.5 text-[10px] border rounded bg-gray-50">Medium-Long</button>
            <button type="button" class="select-single py-1.5 text-[10px] border rounded bg-gray-50">Long</button>
          </div>
          <div class="space-y-2">
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-1">Aftertaste Notes</label>
              <textarea id="cup_af_note" rows="2" class="w-full p-2 border rounded text-xs bg-gray-50 resize-none overflow-y-auto"></textarea>
            </div>
            <div>
              <label class="block text-xs font-semibold text-red-600 mb-1">Negative Notes</label>
              <textarea id="cup_af_neg" rows="2" class="w-full p-2 border border-red-200 bg-red-50 rounded text-xs text-red-800 resize-none overflow-y-auto"></textarea>
            </div>
          </div>
        </div>

        <!-- Acidity -->
        <div class="border-b pb-4">
          <h4 class="text-sm font-bold text-gray-800 mb-2 border-l-4 border-yellow-500 pl-2">Acidity</h4>
          <label class="block text-[10px] font-semibold text-gray-500 mb-1">Intensity</label>
          <div class="grid grid-cols-5 gap-1 mb-3" id="grp_ac_int">
            <button type="button" class="select-single py-1.5 text-[10px] border rounded bg-gray-50">Low</button>
            <button type="button" class="select-single py-1.5 text-[10px] border rounded bg-gray-50">Medium-Low</button>
            <button type="button" class="select-single py-1.5 text-[10px] border rounded bg-gray-50">Medium</button>
            <button type="button" class="select-single py-1.5 text-[10px] border rounded bg-gray-50">Medium-High</button>
            <button type="button" class="select-single py-1.5 text-[10px] border rounded bg-gray-50">High</button>
          </div>
          <label class="block text-[10px] font-semibold text-gray-500 mb-1">Type</label>
          <div class="grid grid-cols-3 gap-1" id="grp_ac_type">
            <button type="button" class="select-multi py-1.5 text-[10px] border rounded bg-gray-50">Citric</button>
            <button type="button" class="select-multi py-1.5 text-[10px] border rounded bg-gray-50">Malic</button>
            <button type="button" class="select-multi py-1.5 text-[10px] border rounded bg-gray-50">Tartaric</button>
            <button type="button" class="select-multi py-1.5 text-[10px] border rounded bg-gray-50">Lactic</button>
            <button type="button" class="select-multi py-1.5 text-[10px] border rounded bg-gray-50">Acetic</button>
            <button type="button" class="select-multi py-1.5 text-[10px] border rounded bg-gray-50">Phosphoric</button>
            <button type="button" class="select-multi py-1.5 text-[10px] border rounded bg-gray-50">Butyric</button>
            <button type="button" class="select-multi py-1.5 text-[10px] border rounded bg-gray-50">Succinic</button>
            <button type="button" class="select-multi py-1.5 text-[10px] border rounded bg-gray-50">Other</button>
          </div>
        </div>

        <!-- Sweetness -->
        <div class="border-b pb-4">
          <h4 class="text-sm font-bold text-gray-800 mb-2 border-l-4 border-yellow-500 pl-2">Sweetness</h4>
          <label class="block text-[10px] font-semibold text-gray-500 mb-1">Intensity</label>
          <div class="grid grid-cols-5 gap-1" id="grp_sw_int">
            <button type="button" class="select-single py-1.5 text-[10px] border rounded bg-gray-50">Low</button>
            <button type="button" class="select-single py-1.5 text-[10px] border rounded bg-gray-50">Medium-Low</button>
            <button type="button" class="select-single py-1.5 text-[10px] border rounded bg-gray-50">Medium</button>
            <button type="button" class="select-single py-1.5 text-[10px] border rounded bg-gray-50">Medium-High</button>
            <button type="button" class="select-single py-1.5 text-[10px] border rounded bg-gray-50">High</button>
          </div>
        </div>

        <!-- Mouthfeel -->
        <div class="border-b pb-4">
          <h4 class="text-sm font-bold text-gray-800 mb-2 border-l-4 border-green-500 pl-2">Mouthfeel</h4>
          <label class="block text-[10px] font-semibold text-gray-500 mb-1">Intensity</label>
          <div class="grid grid-cols-5 gap-1 mb-3" id="grp_mf_int">
            <button type="button" class="select-single py-1.5 text-[10px] border rounded bg-gray-50">Light</button>
            <button type="button" class="select-single py-1.5 text-[10px] border rounded bg-gray-50">Medium-Light</button>
            <button type="button" class="select-single py-1.5 text-[10px] border rounded bg-gray-50">Medium</button>
            <button type="button" class="select-single py-1.5 text-[10px] border rounded bg-gray-50">Medium-Heavy</button>
            <button type="button" class="select-single py-1.5 text-[10px] border rounded bg-gray-50">Heavy</button>
          </div>
          <div class="space-y-2">
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-1">Mouthfeel Notes</label>
              <textarea id="cup_mf_note" rows="2" class="w-full p-2 border rounded text-xs bg-gray-50 resize-none overflow-y-auto"></textarea>
            </div>
            <div>
              <label class="block text-xs font-semibold text-red-600 mb-1">Negative Notes</label>
              <textarea id="cup_mf_neg" rows="2" class="w-full p-2 border border-red-200 bg-red-50 rounded text-xs text-red-800 resize-none overflow-y-auto"></textarea>
            </div>
          </div>
        </div>

        <!-- Overall -->
        <div>
          <h4 class="text-sm font-bold text-gray-800 mb-2 border-l-4 border-purple-500 pl-2">Overall</h4>
          <div class="space-y-2">
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-1">Overall Notes</label>
              <textarea id="cup_ov_note" rows="2" class="w-full p-2 border rounded text-xs bg-gray-50 resize-none overflow-y-auto"></textarea>
            </div>
            <div>
              <label class="block text-xs font-semibold text-red-600 mb-1">Negative Notes</label>
              <textarea id="cup_ov_neg" rows="2" class="w-full p-2 border border-red-200 bg-red-50 rounded text-xs text-red-800 resize-none overflow-y-auto"></textarea>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- Group 5: 가치 평가 -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <button type="button" class="w-full px-4 py-3 bg-gray-50 flex justify-between font-bold text-sm border-b" onclick="toggleAcc(this)">
        <span>5. 가치 평가 (Evaluation)</span> <span class="arrow text-gray-400">▲</span>
      </button>
      <div class="accordion-content p-4 space-y-5">
        
        <div>
          <label class="block text-xs font-semibold mb-1">Possible Roasting point</label>
          <div class="grid grid-cols-5 gap-1" id="grp_roast_pos">
            <button type="button" class="select-multi py-2 text-[10px] border rounded bg-gray-50">Light</button>
            <button type="button" class="select-multi py-2 text-[10px] border rounded bg-gray-50">Medium-Light</button>
            <button type="button" class="select-multi py-2 text-[10px] border rounded bg-gray-50">Medium</button>
            <button type="button" class="select-multi py-2 text-[10px] border rounded bg-gray-50">Medium-Dark</button>
            <button type="button" class="select-multi py-2 text-[10px] border rounded bg-gray-50">Dark</button>
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold mb-1">Roasting point Recommendation</label>
          <div class="grid grid-cols-5 gap-1" id="grp_roast_rec">
            <button type="button" class="select-multi py-2 text-[10px] border rounded bg-gray-50">Light</button>
            <button type="button" class="select-multi py-2 text-[10px] border rounded bg-gray-50">Medium-Light</button>
            <button type="button" class="select-multi py-2 text-[10px] border rounded bg-gray-50">Medium</button>
            <button type="button" class="select-multi py-2 text-[10px] border rounded bg-gray-50">Medium-Dark</button>
            <button type="button" class="select-multi py-2 text-[10px] border rounded bg-gray-50">Dark</button>
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold mb-1 text-purple-700">Sensory Quality Comment</label>
          <textarea id="cup_qualityComm" rows="3" class="w-full p-2 border rounded-lg text-sm bg-gray-50 resize-none overflow-y-auto"></textarea>
        </div>
        
        <div class="pt-3 border-t">
          <label class="block text-xs font-semibold mb-1">Short Description</label>
          <textarea id="cup_shortDesc" rows="2" class="w-full p-2 border rounded-lg text-sm bg-gray-50 resize-none overflow-y-auto"></textarea>
        </div>
        <div>
          <label class="block text-xs font-semibold mb-1">Price List Notes</label>
          <textarea id="cup_priceNote" rows="2" class="w-full p-2 border rounded-lg text-sm bg-gray-50 resize-none overflow-y-auto"></textarea>
        </div>

        <!-- 실시간 요약 (Unrefined & Negative) -->
        <div class="bg-gray-100 p-3 rounded-lg border border-gray-200 mt-2">
          <div class="flex justify-between items-center mb-1">
            <label class="text-[10px] font-bold text-gray-500">Unrefined Notes (실시간 수식 연산)</label>
          </div>
          <textarea id="preview_unrefined" readonly rows="4" class="w-full bg-transparent text-xs font-mono outline-none resize-none text-blue-800 overflow-y-auto"></textarea>
          
          <div class="flex justify-between items-center mb-1 mt-2">
            <label class="text-[10px] font-bold text-gray-500">Negative Notes</label>
          </div>
          <textarea id="preview_negative" readonly rows="2" class="w-full bg-transparent text-xs font-mono outline-none resize-none text-red-600 overflow-y-auto"></textarea>
        </div>

      </div>
    </div>

    <!-- 하단 버튼 -->
    <div class="grid grid-cols-2 gap-4 pt-4">
      <button type="button" onclick="saveDraft()" class="w-full py-4 bg-amber-500 text-white font-bold rounded-xl shadow-md text-sm active:scale-95 transition-transform">💾 임시 저장</button>
      <button type="button" onclick="submitForm()" class="w-full py-4 bg-purple-600 text-white font-bold rounded-xl shadow-md text-sm active:scale-95 transition-transform">🚀 검사 완료</button>
    </div>
  </form>
</div>

<!-- 개별 / 다중 불러오기 공용 모달 -->
<div id="draftModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-xl shadow-xl max-w-lg w-full p-4 space-y-4">
    <div class="flex justify-between items-center border-b pb-2">
      <h3 id="draftModalTitle" class="font-bold text-sm text-gray-800">📂 임시저장 불러오기</h3>
      <button type="button" onclick="closeDraftModal()" class="text-gray-400 font-bold hover:text-gray-600">✕</button>
    </div>
    <div id="draftModalList" class="max-h-60 overflow-y-auto space-y-2 text-xs">
      <!-- JS 동적 생성 -->
    </div>
    <div class="flex justify-end gap-2 border-t pt-2">
      <button type="button" onclick="closeDraftModal()" class="px-3 py-1.5 bg-gray-200 text-gray-700 rounded text-xs font-bold">취소</button>
      <button type="button" id="draftModalConfirmBtn" class="px-3 py-1.5 bg-purple-600 text-white rounded text-xs font-bold">확인</button>
    </div>
  </div>
</div>

<script>
// ==========================================
// 초기화 및 UI 로직
// ==========================================
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('cup_date').value = new Date().toISOString().substring(0, 10);
  buildDefectBlocks();
  buildCuppingScores();
  setupInteractions();
  loadDraftList();
  
  document.getElementById('cuppingForm').addEventListener('input', updateRealtimePreview);
  document.getElementById('cuppingForm').addEventListener('click', updateRealtimePreview);
});

function toggleAcc(button) {
  const content = button.nextElementSibling;
  const arrow = button.querySelector('.arrow');
  if (content.classList.contains('closed')) {
    content.classList.remove('closed');
    arrow.textContent = '▲';
  } else {
    content.classList.add('closed');
    arrow.textContent = '▼';
  }
}

function setupInteractions() {
  document.addEventListener('click', function(e) {
    if(e.target && e.target.classList.contains('select-single')) {
      const parent = e.target.parentElement;
      parent.querySelectorAll('.select-single').forEach(b => b.classList.remove('active-btn'));
      e.target.classList.add('active-btn');
    }
    if(e.target && e.target.classList.contains('select-multi')) {
      e.target.classList.toggle('active-btn');
    }
  });
}

function getValSingle(groupId) {
  const parent = document.getElementById(groupId);
  if(!parent) return "";
  const active = parent.querySelector('.active-btn');
  return active ? active.innerText.trim() : "";
}

function getValMulti(groupId) {
  const parent = document.getElementById(groupId);
  if(!parent) return "";
  const actives = parent.querySelectorAll('.active-btn');
  let arr = [];
  actives.forEach(b => arr.push(b.innerText.trim()));
  return arr.join(', ');
}

function val(id) { 
  return document.getElementById(id) ? document.getElementById(id).value.trim() : ""; 
}

// ==========================================
// 디펙트 (Group 2) 렌더링
// ==========================================
function buildDefectBlocks() {
  const container = document.getElementById('defect-container');
  if(!container) return;
  container.innerHTML = '';
  const blocks = [
    {id: 'ov', title: 'Overall', kInt: 'Defect-Intensity', kTyp: 'Defect-Type'}, 
    {id: 'c1', title: 'Cup 1', kInt: 'Defect-Intensity (Cup1)', kTyp: 'Defect-Type (Cup1)'}, 
    {id: 'c2', title: 'Cup 2', kInt: 'Defect-Intensity (Cup2)', kTyp: 'Defect-Type (Cup2)'}, 
    {id: 'c3', title: 'Cup 3', kInt: 'Defect-Intensity (Cup3)', kTyp: 'Defect-Type (Cup3)'}
  ];
  const types = ["Quaker", "Papery", "Woody", "Phenol", "Over-Fermented", "Leathery", "Stinker", "Others"];
  
  blocks.forEach(b => {
    let typeBtns = types.map(t => `<button type="button" class="select-multi py-1.5 text-[10px] border rounded bg-white">${t}</button>`).join('');
    container.innerHTML += `
      <div class="bg-red-50 p-3 rounded-lg border border-red-100" data-kint="${b.kInt}" data-ktyp="${b.kTyp}">
        <label class="block text-xs font-bold text-red-700 mb-2">${b.title}</label>
        <div class="mb-2">
          <span class="text-[10px] font-semibold text-gray-500 block mb-1">Intensity</span>
          <div class="grid grid-cols-4 gap-1" id="grp_def_int_${b.id}">
            <button type="button" class="select-single py-1.5 text-[10px] border rounded bg-white">Low</button>
            <button type="button" class="select-single py-1.5 text-[10px] border rounded bg-white">Medium</button>
            <button type="button" class="select-single py-1.5 text-[10px] border rounded bg-white">High</button>
            <button type="button" class="select-single py-1.5 text-[10px] border rounded bg-white active-btn">None</button>
          </div>
        </div>
        <div>
          <span class="text-[10px] font-semibold text-gray-500 block mb-1">Type</span>
          <div class="grid grid-cols-4 gap-1" id="grp_def_typ_${b.id}">
            ${typeBtns}
          </div>
        </div>
      </div>
    `;
  });
}

// ==========================================
// 센서리 점수 (Group 3) 렌더링
// ==========================================
const SCORE_FIELDS = [
  { id: 'sc_clean', label: 'Clean Cup', key: 'Clean Cup' },
  { id: 'sc_sweet', label: 'Sweetness', key: 'Sweetness' },
  { id: 'sc_acid', label: 'Acidity', key: 'Acidity' },
  { id: 'sc_mouth', label: 'Mouthfeel', key: 'Mouthfeel' },
  { id: 'sc_flav', label: 'Flavour', key: 'Flavour' },
  { id: 'sc_after', label: 'Aftertaste', key: 'Aftertaste' },
  { id: 'sc_bal', label: 'Balance', key: 'Balance' },
  { id: 'sc_over', label: 'Overall', key: 'Overall' }
];

function buildCuppingScores() {
  const container = document.getElementById('score-container');
  if(!container) return;
  container.innerHTML = '';
  SCORE_FIELDS.forEach(field => {
    container.innerHTML += `
      <div class="flex items-center justify-between p-2 border-b border-gray-100">
        <label class="text-sm font-bold text-gray-700 w-24">${field.label}</label>
        <div class="flex items-center gap-1">
          <button type="button" onclick="stepScore('${field.id}', -0.25)" class="w-8 h-8 bg-gray-100 rounded text-gray-600 font-bold active:bg-gray-300">-</button>
          <input type="number" id="${field.id}" value="6.00" step="0.25" min="0" max="8" class="w-16 text-center font-mono border rounded p-1 text-sm bg-purple-50 text-purple-900 font-bold outline-none" onchange="calcTotalScore(); updateRealtimePreview();">
          <button type="button" onclick="stepScore('${field.id}', 0.25)" class="w-8 h-8 bg-gray-100 rounded text-gray-600 font-bold active:bg-gray-300">+</button>
        </div>
      </div>
    `;
  });
  calcTotalScore();
}

function stepScore(id, amount) {
  const input = document.getElementById(id);
  let v = parseFloat(input.value) || 0;
  v += amount;
  if(v < 0) v = 0; if(v > 8) v = 8;
  input.value = v.toFixed(2);
  calcTotalScore();
  updateRealtimePreview();
}

function calcTotalScore() {
  let total = 36;
  SCORE_FIELDS.forEach(f => {
    total += parseFloat(val(f.id)) || 0;
  });
  const totalEl = document.getElementById('cup_total_score');
  if(totalEl) totalEl.innerText = total.toFixed(2);
}

// ==========================================
// 실시간 연산기 (Unrefined & Negative)
// ==========================================
function updateRealtimePreview() {
  let unrefined = [];
  
  let tNote = val('cup_fl_top'), eNote = val('cup_fl_extra');
  let flavStr = "";
  if(tNote) flavStr += `[Main Flavor] ${tNote}`;
  else if(eNote) flavStr += `[Main Flavor] ${eNote}`;
  if(tNote && eNote) flavStr += ` [Extra Flavor] ${eNote}`;
  if(flavStr) unrefined.push(flavStr.trim());

  let acInt = getValSingle('grp_ac_int'), acType = getValMulti('grp_ac_type');
  if(acInt || acType) unrefined.push(`[Acidity] ${acInt} ${acType}`.trim());

  let swInt = getValSingle('grp_sw_int');
  if(swInt) unrefined.push(`[Sweetness] ${swInt}`);

  let mfInt = getValSingle('grp_mf_int'), mfNote = val('cup_mf_note');
  if(mfInt || mfNote) unrefined.push(`[Mouthfeel] ${mfInt} ${mfNote}`.trim());

  let afInt = getValSingle('grp_af_int'), afNote = val('cup_af_note');
  if(afInt || afNote) unrefined.push(`[Aftertaste] ${afInt} ${afNote}`.trim());

  let cleanScore = parseFloat(val('sc_clean') || 0);
  let balScore = parseFloat(val('sc_bal') || 0);
  let ovNote = val('cup_ov_note');
  
  if(cleanScore >= 6.5 || balScore >= 6.5 || ovNote) {
    let ovArr = [];
    if(cleanScore >= 6.5) ovArr.push("Clean");
    if(balScore >= 6.5) ovArr.push(cleanScore >= 6.5 ? "Well balanced" : "Balanced");
    if(ovNote) ovArr.push(ovNote);
    unrefined.push(`[Overall] ` + ovArr.join(", "));
  }
  const unrefEl = document.getElementById('preview_unrefined');
  if(unrefEl) unrefEl.value = unrefined.join('\n');

  let negative = [];
  if(val('cup_fl_neg')) negative.push(`[Flavour] ${val('cup_fl_neg')}`);
  if(val('cup_af_neg')) negative.push(`[Aftertaste] ${val('cup_af_neg')}`);
  if(val('cup_mf_neg')) negative.push(`[Mouthfeel] ${val('cup_mf_neg')}`);
  if(val('cup_ov_neg')) negative.push(`[Overall] ${val('cup_ov_neg')}`);
  
  let defInt = getValSingle('grp_def_int_ov'), defType = getValMulti('grp_def_typ_ov');
  if(defInt && defInt !== "None") {
    let dStr = `[Defect] ${defInt}${defType ? ', ' + defType : ''}`.trim();
    negative.push(dStr);
  }
  const negEl = document.getElementById('preview_negative');
  if(negEl) negEl.value = negative.join('\n');
}

// ==========================================
// 데이터 수집 및 서버 전송 (단일 폼)
// ==========================================
function getCuppingPayload(status) {
  // 💡 [단일 폼 ID 선발급] 저장 전 rowId가 없다면 즉시 생성하여 덮어쓰기 대비
  if (!currentDraftRowId) {
    currentDraftRowId = "ID_" + Date.now();
  }

  let payload = { 
    formType: "cupping", 
    status: status || "Completed",
    rowId: currentDraftRowId,
    fields: {} 
  };
  
  // 💡 구글 시트 셀(BA열)에 ID가 직접 기록되도록 강제 주입
  payload.fields["Row_ID"] = currentDraftRowId;
  payload.fields["Row ID"] = currentDraftRowId;

  payload.fields["Coffee Name"] = val('cup_name');
  payload.fields["Lot Code"] = val('cup_lotCode');
  payload.fields["Lot Number"] = val('cup_lotNum');
  payload.fields["Cupping Date"] = val('cup_date');
  payload.fields["Roasting Profile"] = val('cup_roastProfile');
  payload.fields["Roaster"] = getValSingle('group_roaster');

  ['ov', 'c1', 'c2', 'c3'].forEach(id => {
    let block = document.getElementById('grp_def_int_' + id).parentElement.parentElement;
    payload.fields[block.dataset.kint] = getValSingle('grp_def_int_' + id);
    payload.fields[block.dataset.ktyp] = getValMulti('grp_def_typ_' + id);
  });

  SCORE_FIELDS.forEach(f => {
    payload.fields[f.key] = val(f.id);
  });
  payload.fields["Score Detail"] = document.getElementById('cup_total_score').innerText;

  payload.fields["Flavour-Intensity"] = getValSingle('grp_fl_int');
  payload.fields["Main Flavour-Top Notes"] = val('cup_fl_top');
  payload.fields["Flavour-Extra Notes"] = val('cup_fl_extra');
  payload.fields["Flavour-Negative"] = val('cup_fl_neg');

  payload.fields["Aftertaste-Intensity"] = getValSingle('grp_af_int');
  payload.fields["Aftertaste-Notes"] = val('cup_af_note');
  payload.fields["Aftertaste-Negative"] = val('cup_af_neg');

  payload.fields["Acidity-Intensity"] = getValSingle('grp_ac_int');
  payload.fields["Acidity-Type"] = getValMulti('grp_ac_type');

  payload.fields["Sweetness-Intensity"] = getValSingle('grp_sw_int');

  payload.fields["Mouthfeel-Intensity"] = getValSingle('grp_mf_int');
  payload.fields["Mouthfeel-Notes"] = val('cup_mf_note');
  payload.fields["Mouthfeel-Negative"] = val('cup_mf_neg');

  payload.fields["Overall-Notes"] = val('cup_ov_note');
  payload.fields["Overall-Negative"] = val('cup_ov_neg');

  payload.fields["Possible Roasting point"] = getValMulti('grp_roast_pos');
  payload.fields["Roasting point Recommendation"] = getValMulti('grp_roast_rec');
  payload.fields["Sensory Quality Comment"] = val('cup_qualityComm');
  payload.fields["Short description"] = val('cup_shortDesc');
  payload.fields["Price list Notes"] = val('cup_priceNote');
  
  payload.fields["Unrefined Notes"] = val('preview_unrefined');
  payload.fields["Negative Notes"] = val('preview_negative');

  return payload;
}
// ==========================================
// 구글 시트 연동 임시저장 및 서버 전송
// ==========================================
function saveDraft() {
  const data = getCuppingPayload("Draft");
  if(!data.fields["Coffee Name"]) {
    alert("Coffee Name을 먼저 입력해주세요.");
    return;
  }
  sendToServer(data, "💾 시트에 임시저장되었습니다.");
}

function submitForm() {
  const data = getCuppingPayload("Completed");
  if(!data.fields["Coffee Name"]) {
    alert("필수 항목(Coffee Name)을 입력해주세요.");
    return;
  }
  if(!confirm("🚀 검사를 완료하시겠습니까?\n완료 처리된 데이터는 앱에서 수정할 수 없습니다.")) {
    return;
  }
  sendToServer(data, "🚀 검사가 완료 처리되었습니다!");
}

function sendToServer(payload, successMsg) {
  const btn = event ? event.target : null;
  const originText = btn ? btn.innerText : "";
  if(btn) { btn.innerText = "⏳ 처리 중..."; btn.disabled = true; }

  fetch(GOOGLE_WEB_APP_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).then(() => {
    if(successMsg) alert(successMsg);
    if(btn) { btn.innerText = originText; btn.disabled = false; }
    
    if(payload.status === "Completed") {
      currentDraftRowId = null;
      document.getElementById('cuppingForm').reset();
      clearAllActiveButtons();
      buildCuppingScores();
      updateRealtimePreview();
    }
    setTimeout(loadDraftList, 1500);
  }).catch(e => {
    alert("오류가 발생했습니다. 네트워크 상태를 확인하세요.");
    if(btn) { btn.innerText = originText; btn.disabled = false; }
  });
}

async function loadDraftList() {
  const select = document.getElementById('draftSelect');
  if(!select) return;
  select.innerHTML = '<option value="">-- 불러오는 중... --</option>';

  try {
    const res = await fetch(`${GOOGLE_WEB_APP_URL}?formType=cupping&action=getDrafts`);
    const data = await res.json();
    
    select.innerHTML = '<option value="">-- 새로 작성하기 --</option>';
    loadedDraftsCache = (data && data.drafts) ? data.drafts : [];

    loadedDraftsCache.forEach(draft => {
      const opt = document.createElement('option');
      opt.value = draft.rowId;
      const cName = draft.fields["Coffee Name"] || "이름 없음";
      const cDate = draft.fields["Cupping Date"] || "";
      const cLot = draft.fields["Lot Code"] ? ` (${draft.fields["Lot Code"]})` : "";
      
      opt.textContent = `📂 ${cName} - ${cDate}${cLot}`;
      select.appendChild(opt);
    });
    if(currentDraftRowId) select.value = currentDraftRowId;
  } catch(e) {
    select.innerHTML = '<option value="">-- 목록 불러오기 실패 --</option>';
  }
}

function loadSelectedDraft(rowId) {
  if(!rowId) {
    currentDraftRowId = null;
    document.getElementById('cuppingForm').reset();
    clearAllActiveButtons();
    buildCuppingScores();
    updateRealtimePreview();
    return;
  }
  
  currentDraftRowId = rowId;
  const draft = loadedDraftsCache.find(d => String(d.rowId) === String(currentDraftRowId));
  if(!draft) return;

  const f = draft.fields || {};
  document.getElementById('cup_name').value = f["Coffee Name"] || "";
  document.getElementById('cup_lotCode').value = f["Lot Code"] || "";
  document.getElementById('cup_lotNum').value = f["Lot Number"] || "";
  document.getElementById('cup_date').value = f["Cupping Date"] || new Date().toISOString().substring(0, 10);
  document.getElementById('cup_roastProfile').value = f["Roasting Profile"] || "";
  
  setValSingle('group_roaster', f["Roaster"]);

  const defBlocks = [
    {id: 'ov', kInt: 'Defect-Intensity', kTyp: 'Defect-Type'},
    {id: 'c1', kInt: 'Defect-Intensity (Cup1)', kTyp: 'Defect-Type (Cup1)'},
    {id: 'c2', kInt: 'Defect-Intensity (Cup2)', kTyp: 'Defect-Type (Cup2)'},
    {id: 'c3', kInt: 'Defect-Intensity (Cup3)', kTyp: 'Defect-Type (Cup3)'}
  ];
  defBlocks.forEach(b => {
    setValSingle('grp_def_int_' + b.id, f[b.kInt] || "None");
    setValMulti('grp_def_typ_' + b.id, f[b.kTyp] || "");
  });

  SCORE_FIELDS.forEach(sf => {
    if(f[sf.key] !== undefined) {
      const input = document.getElementById(sf.id);
      if(input) input.value = parseFloat(f[sf.key]).toFixed(2);
    }
  });
  calcTotalScore();

  setValSingle('grp_fl_int', f["Flavour-Intensity"]);
  document.getElementById('cup_fl_top').value = f["Main Flavour-Top Notes"] || "";
  document.getElementById('cup_fl_extra').value = f["Flavour-Extra Notes"] || "";
  document.getElementById('cup_fl_neg').value = f["Flavour-Negative"] || "";

  setValSingle('grp_af_int', f["Aftertaste-Intensity"]);
  document.getElementById('cup_af_note').value = f["Aftertaste-Notes"] || "";
  document.getElementById('cup_af_neg').value = f["Aftertaste-Negative"] || "";

  setValSingle('grp_ac_int', f["Acidity-Intensity"]);
  setValMulti('grp_ac_type', f["Acidity-Type"]);

  setValSingle('grp_sw_int', f["Sweetness-Intensity"]);

  setValSingle('grp_mf_int', f["Mouthfeel-Intensity"]);
  document.getElementById('cup_mf_note').value = f["Mouthfeel-Notes"] || "";
  document.getElementById('cup_mf_neg').value = f["Mouthfeel-Negative"] || "";

  document.getElementById('cup_ov_note').value = f["Overall-Notes"] || "";
  document.getElementById('cup_ov_neg').value = f["Overall-Negative"] || "";

  setValMulti('grp_roast_pos', f["Possible Roasting point"]);
  setValMulti('grp_roast_rec', f["Roasting point Recommendation"]);
  document.getElementById('cup_qualityComm').value = f["Sensory Quality Comment"] || "";
  document.getElementById('cup_shortDesc').value = f["Short description"] || "";
  document.getElementById('cup_priceNote').value = f["Price list Notes"] || "";

  updateRealtimePreview();
}

function clearAllActiveButtons() {
  document.querySelectorAll('.select-single, .select-multi').forEach(b => b.classList.remove('active-btn'));
  ['ov', 'c1', 'c2', 'c3'].forEach(id => {
    setValSingle('grp_def_int_' + id, 'None');
  });
}

function setValSingle(groupId, valStr) {
  const parent = document.getElementById(groupId);
  if(!parent) return;
  parent.querySelectorAll('.select-single').forEach(b => {
    if(valStr && b.innerText.trim() === valStr.trim()) b.classList.add('active-btn');
    else b.classList.remove('active-btn');
  });
}

function setValMulti(groupId, commaStr) {
  const parent = document.getElementById(groupId);
  if(!parent) return;
  const list = commaStr ? commaStr.split(',').map(s => s.trim()) : [];
  parent.querySelectorAll('.select-multi').forEach(b => {
    if(list.includes(b.innerText.trim())) b.classList.add('active-btn');
    else b.classList.remove('active-btn');
  });
}

// ==========================================
// 모드 전환 제어 (단일 <-> 다중)
// ==========================================
function switchMode(mode) {
  const container = document.getElementById('app-container');
  const tabSingle = document.getElementById('tab-single');
  const tabMulti = document.getElementById('tab-multi');
  const formSingle = document.getElementById('cuppingForm');
  const formMulti = document.getElementById('multiCuppingForm');
  const draftSelect = document.getElementById('draftSelect');

  if (mode === 'single') {
    container.classList.replace('max-w-7xl', 'max-w-md');
    tabSingle.className = "flex-1 py-2 text-sm font-bold rounded-md bg-white shadow text-purple-700 transition-all";
    tabMulti.className = "flex-1 py-2 text-sm font-bold rounded-md text-gray-500 hover:text-gray-700 transition-all";
    
    formSingle.classList.remove('hidden');
    formMulti.classList.add('hidden');
    
    if (draftSelect) {
      draftSelect.disabled = false;
      draftSelect.classList.remove('opacity-50', 'cursor-not-allowed');
    }
  } else {
    container.classList.replace('max-w-md', 'max-w-7xl');
    tabMulti.className = "flex-1 py-2 text-sm font-bold rounded-md bg-white shadow text-purple-700 transition-all";
    tabSingle.className = "flex-1 py-2 text-sm font-bold rounded-md text-gray-500 hover:text-gray-700 transition-all";
    
    formMulti.classList.remove('hidden');
    formSingle.classList.add('hidden');
    
    if (draftSelect) {
      draftSelect.disabled = true;
      draftSelect.value = "";
      draftSelect.classList.add('opacity-50', 'cursor-not-allowed');
    }
    
    const multiContainer = document.getElementById('multiGridContainer');
    if (!multiContainer.children.length) {
      renderMultiGrid();
    }
  }
}

// ==========================================
// 다중 입력 2단 그리드 생성 및 렌더러
// ==========================================
function toggleMultiSelect(id) {
  const pop = document.getElementById(id + '_pop');
  if(!pop) return;
  document.querySelectorAll('[id$="_pop"]').forEach(el => {
    if(el !== pop) el.classList.add('hidden');
  });
  pop.classList.toggle('hidden');
}

function updateMultiLabel(popId, btnId, defaultText) {
  const pop = document.getElementById(popId);
  const btn = document.getElementById(btnId);
  if (!pop || !btn) return;

  const checked = Array.from(pop.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);
  
  if (checked.length === 0) {
    btn.innerHTML = `${defaultText} <span class="float-right text-[10px]">▼</span>`;
  } else {
    btn.innerHTML = `${checked.join(', ')} <span class="float-right text-[10px]">▼</span>`;
  }
}

function acidityTypeBoxes(i) {
  const types = ["Citric", "Malic", "Tartaric", "Lactic", "Acetic", "Phosphoric", "Butyric", "Succinic", "Other"];
  return types.map(t => `
    <label class="flex items-center gap-1.5 text-xs text-gray-800 cursor-pointer hover:bg-gray-100 p-1 rounded">
      <input type="checkbox" name="m_ac_type_${i}" value="${t}" onchange="updateMultiLabel('m_ac_type_${i}_pop', 'm_ac_type_btn_${i}', 'Acidity 종류')" class="rounded text-purple-600 focus:ring-0"> ${t}
    </label>
  `).join('');
}

function defectTypeBoxes(i, cupKey) {
  const types = ["Quaker", "Papery", "Woody", "Phenol", "Over-Fermented", "Leathery", "Stinker", "Others"];
  return types.map(t => `
    <label class="flex items-center gap-1.5 text-xs text-gray-800 cursor-pointer hover:bg-gray-100 p-1 rounded">
      <input type="checkbox" name="m_def_typ_${cupKey}_${i}" value="${t}" onchange="updateMultiLabel('m_def_typ_${cupKey}_${i}_pop', 'm_def_typ_${cupKey}_btn_${i}', 'Defect 종류')" class="rounded text-purple-600 focus:ring-0"> ${t}

  const points = ["Light", "Medium-Light", "Medium", "Medium-Dark", "Dark"];
  return points.map(p => `
    <label class="flex items-center gap-1.5 text-xs text-gray-800 cursor-pointer hover:bg-gray-100 p-1 rounded">
      <input type="checkbox" name="m_roast_${typeKey}_${i}" value="${p}" onchange="updateMultiLabel('m_roast_${typeKey}_${i}_pop', 'm_roast_${typeKey}_btn_${i}', 'Roasting point 선택')" class="rounded text-purple-600 focus:ring-0"> ${p}
    </label>
  `).join('');
}

function calcMultiTotal(i) {
  const fields = ['clean', 'sweet', 'acid', 'mouth', 'flav', 'after', 'bal', 'over'];
  let sum = 36;
  fields.forEach(f => {
    const el = document.getElementById(`m_sc_${f}_${i}`);
    if(el) sum += parseFloat(el.value) || 0;
  });
  const totalEl = document.getElementById(`m_total_${i}`);
  if(totalEl) totalEl.innerText = sum.toFixed(2);
}

// 샘플별 개별 저장 / 불러오기 / 복사 로직
// ==========================================
function saveIndividualDraft(i) {
  const cName = document.getElementById(`m_name_${i}`).value.trim();
  if (!cName) {
    alert(`Sample #${i}의 Coffee Name을 입력해주세요.`);
    return;
  }
  const payload = buildSamplePayload(i, "Draft");
  sendToServer(payload, `💾 Sample #${i} 데이터가 구글 시트에 임시저장되었습니다.`);
}

function copySampleToNext(currentIdx) {
  const nextIdx = currentIdx + 1;
  const maxCount = parseInt(document.getElementById('multiSampleCount').value) || 6;
  if (nextIdx > maxCount) {
    alert("마지막 샘플입니다.");
    return;
  }
  const payload = buildSamplePayload(currentIdx, "Draft").fields;
  restoreSampleDataFromDraft(nextIdx, { rowId: null, fields: payload });
  calcMultiTotal(nextIdx);
  alert(`Sample #${currentIdx} 데이터가 Sample #${nextIdx}로 복사되었습니다.`);
}

function copySample1Info() {
  const count = parseInt(document.getElementById('multiSampleCount').value) || 6;
  const s1Name = document.getElementById('m_name_1').value;
  const s1LotCode = document.getElementById('m_lotCode_1').value;
  const s1LotNum = document.getElementById('m_lotNum_1').value;
  const s1Date = document.getElementById('m_date_1').value;
  const s1Roast = document.getElementById('m_roast_1').value;
  const s1Roaster = document.getElementById('m_roaster_1').value;

  for (let i = 2; i <= count; i++) {
    document.getElementById(`m_name_${i}`).value = s1Name;
    document.getElementById(`m_lotCode_${i}`).value = s1LotCode;
    document.getElementById(`m_lotNum_${i}`).value = s1LotNum;
    document.getElementById(`m_date_${i}`).value = s1Date;
    document.getElementById(`m_roast_${i}`).value = s1Roast;
    document.getElementById(`m_roaster_${i}`).value = s1Roaster;
  }
  alert("1번 샘플의 기본 정보가 전체 샘플에 적용되었습니다.");
}

// ==========================================
let targetIndividualIdx = null;

function closeDraftModal() {
  document.getElementById('draftModal').classList.add('hidden');
}

function openIndividualDraftModal(i) {
  targetIndividualIdx = i;
  const modal = document.getElementById('draftModal');
  const title = document.getElementById('draftModalTitle');
  const list = document.getElementById('draftModalList');
  const confirmBtn = document.getElementById('draftModalConfirmBtn');

  title.innerText = `📂 Sample #${i} - 개별 임시저장 불러오기`;
  list.innerHTML = '';

  if (!loadedDraftsCache || loadedDraftsCache.length === 0) {
    list.innerHTML = '<div class="text-center py-4 text-gray-400">저장된 임시저장 데이터가 없습니다.</div>';
  } else {
    loadedDraftsCache.forEach(draft => {
      const f = draft.fields || {};
      const name = f["Coffee Name"] || "이름 없음";
      const date = f["Cupping Date"] || "";
      const lot = f["Lot Code"] ? ` (${f["Lot Code"]})` : "";
      
      list.innerHTML += `
        <label class="flex items-center justify-between p-2 border rounded hover:bg-purple-50 cursor-pointer">
          <div class="flex items-center gap-2">
            <input type="radio" name="indivDraftSelect" value="${draft.rowId}" class="text-purple-600">
            <span class="font-bold text-gray-800">${name}</span>
            <span class="text-gray-500">${date}${lot}</span>
          </div>
        </label>
      `;
    });
  }

  confirmBtn.onclick = function() {
    const selected = document.querySelector('input[name="indivDraftSelect"]:checked');
    if (!selected) {
      alert("불러올 항목을 선택해주세요.");
      return;
    }
    const draft = loadedDraftsCache.find(d => String(d.rowId) === String(selected.value));
    if (draft) {
      restoreSampleDataFromDraft(targetIndividualIdx, draft);
      calcMultiTotal(targetIndividualIdx);
      closeDraftModal();
      alert(`Sample #${targetIndividualIdx}에 선택한 정보가 반영되었습니다.`);
    }
  };

  modal.classList.remove('hidden');
}

function openMultiDraftModal() {
  const modal = document.getElementById('draftModal');
  const title = document.getElementById('draftModalTitle');
  const list = document.getElementById('draftModalList');
  const confirmBtn = document.getElementById('draftModalConfirmBtn');

  title.innerText = `📂 다중 임시저장 불러오기 (체크박스 선택 순서대로 매핑)`;
  list.innerHTML = '';

  if (!loadedDraftsCache || loadedDraftsCache.length === 0) {
    list.innerHTML = '<div class="text-center py-4 text-gray-400">저장된 임시저장 데이터가 없습니다.</div>';
  } else {
    loadedDraftsCache.forEach(draft => {
      const f = draft.fields || {};
      const name = f["Coffee Name"] || "이름 없음";
      const date = f["Cupping Date"] || "";
      const lot = f["Lot Code"] ? ` (${f["Lot Code"]})` : "";
      
      list.innerHTML += `
        <label class="flex items-center justify-between p-2 border rounded hover:bg-purple-50 cursor-pointer">
          <div class="flex items-center gap-2">
            <input type="checkbox" name="multiDraftSelect" value="${draft.rowId}" class="rounded text-purple-600">
            <span class="font-bold text-gray-800">${name}</span>
            <span class="text-gray-500">${date}${lot}</span>
          </div>
        </label>
      `;
    });
  }

  confirmBtn.onclick = function() {
    const checkedEls = Array.from(document.querySelectorAll('input[name="multiDraftSelect"]:checked'));
    if (checkedEls.length === 0) {
      alert("불러올 항목을 최소 1개 이상 선택해주세요.");
      return;
    }

    const count = parseInt(document.getElementById('multiSampleCount').value) || 6;
    if (checkedEls.length > count) {
      alert(`현재 설정된 샘플 수(${count}개)보다 많은 항목을 선택했습니다. 상단 샘플 수를 조정하거나 ${count}개 이하로 선택해주세요.`);
      return;
    }

    checkedEls.forEach((cb, idx) => {
      const sampleIdx = idx + 1;
      const draft = loadedDraftsCache.find(d => String(d.rowId) === String(cb.value));
      if (draft) {
        restoreSampleDataFromDraft(sampleIdx, draft);
        calcMultiTotal(sampleIdx);
      }
    });

    closeDraftModal();
    alert(`선택한 ${checkedEls.length}개의 데이터가 Sample #1부터 순차적으로 매핑되었습니다.`);
  };

  modal.classList.remove('hidden');
}

function buildSamplePayload(i, status)

function getCheckedValues(name) {
  return Array.from(document.querySelectorAll(`input[name="${name}"]:checked`)).map(cb => cb.value).join(', ');
}

function saveMultiDrafts() {
  const count = parseInt(document.getElementById('multiSampleCount').value) || 6;
  let savedCount = 0;
  for (let i = 1; i <= count; i++) {
    const cName = document.getElementById(`m_name_${i}`).value.trim();
    if (cName) {
      const payload = buildSamplePayload(i, "Draft");
      sendToServer(payload, null); 
      savedCount++;
    }
  }
  if (savedCount === 0) {
    alert("저장할 샘플의 Coffee Name을 1개 이상 입력해주세요.");
  } else {
    alert(`💾 입력된 ${savedCount}개 샘플 데이터가 구글 시트에 일괄 저장되었습니다.`);
  }
}

function submitMultiForm() {
  const count = parseInt(document.getElementById('multiSampleCount').value) || 6;
  let savedCount = 0;
  
  if(!confirm("🚀 일괄 검사를 완료하시겠습니까?\n완료 처리된 데이터는 앱에서 수정할 수 없습니다.")) {
    return;
  }

  for (let i = 1; i <= count; i++) {
    const cName = document.getElementById(`m_name_${i}`).value.trim();
    if (cName) {
      const payload = buildSamplePayload(i, "Completed");
      sendToServer(payload, null); 
      savedCount++;
    }
  }
  
  if (savedCount === 0) {
    alert("완료할 샘플의 Coffee Name을 1개 이상 입력해주세요.");
  } else {
    alert(`🚀 ${savedCount}개 샘플 데이터가 성공적으로 검사 완료 처리되었습니다!`);
    renderMultiGrid();
  }
}

function restoreSampleDataFromDraft(i, draft) {
  const f = draft.fields;
  if (!f) return;

  const container = document.querySelector(`[data-sample-idx="${i}"]`);
  if (container) {
    container.dataset.rowId = draft.rowId || "";
  }

  document.getElementById(`m_name_${i}`).value = f["Coffee Name"] || "";
  document.getElementById(`m_lotCode_${i}`).value = f["Lot Code"] || "";
  document.getElementById(`m_lotNum_${i}`).value = f["Lot Number"] || "";
  document.getElementById(`m_date_${i}`).value = f["Cupping Date"] || new Date().toISOString().substring(0, 10);
  document.getElementById(`m_roast_${i}`).value = f["Roasting Profile"] || "";
  document.getElementById(`m_roaster_${i}`).value = f["Roaster"] || "";

  document.getElementById(`m_sc_clean_${i}`).value = parseFloat(f["Clean Cup"] || 6.00).toFixed(2);
  document.getElementById(`m_sc_sweet_${i}`).value = parseFloat(f["Sweetness"] || 6.00).toFixed(2);
  document.getElementById(`m_sc_acid_${i}`).value = parseFloat(f["Acidity"] || 6.00).toFixed(2);
  document.getElementById(`m_sc_mouth_${i}`).value = parseFloat(f["Mouthfeel"] || 6.00).toFixed(2);
  document.getElementById(`m_sc_flav_${i}`).value = parseFloat(f["Flavour"] || 6.00).toFixed(2);
  document.getElementById(`m_sc_after_${i}`).value = parseFloat(f["Aftertaste"] || 6.00).toFixed(2);
  document.getElementById(`m_sc_bal_${i}`).value = parseFloat(f["Balance"] || 6.00).toFixed(2);
  document.getElementById(`m_sc_over_${i}`).value = parseFloat(f["Overall"] || 6.00).toFixed(2);

  document.getElementById(`m_sw_int_${i}`).value = f["Sweetness-Intensity"] || "";
  document.getElementById(`m_ac_int_${i}`).value = f["Acidity-Intensity"] || "";
  setCheckboxes(`m_ac_type_${i}`, f["Acidity-Type"]);

  document.getElementById(`m_mf_int_${i}`).value = f["Mouthfeel-Intensity"] || "";
  document.getElementById(`m_mf_note_${i}`).value = f["Mouthfeel-Notes"] || "";
  document.getElementById(`m_mf_neg_${i}`).value = f["Mouthfeel-Negative"] || "";

  document.getElementById(`m_af_int_${i}`).value = f["Aftertaste-Intensity"] || "";
  document.getElementById(`m_af_note_${i}`).value = f["Aftertaste-Notes"] || "";
  document.getElementById(`m_af_neg_${i}`).value = f["Aftertaste-Negative"] || "";

  document.getElementById(`m_fl_int_${i}`).value = f["Flavour-Intensity"] || "";
  document.getElementById(`m_fl_top_${i}`).value = f["Main Flavour-Top Notes"] || "";
  document.getElementById(`m_fl_extra_${i}`).value = f["Flavour-Extra Notes"] || "";
  document.getElementById(`m_fl_neg_${i}`).value = f["Flavour-Negative"] || "";

  document.getElementById(`m_def_int_ov_${i}`).value = f["Defect-Intensity"] || "None";
  setCheckboxes(`m_def_typ_ov_${i}`, f["Defect-Type"]);
  document.getElementById(`m_def_int_c1_${i}`).value = f["Defect-Intensity (Cup1)"] || "None";
  setCheckboxes(`m_def_typ_c1_${i}`, f["Defect-Type (Cup1)"]);
  document.getElementById(`m_def_int_c2_${i}`).value = f["Defect-Intensity (Cup2)"] || "None";
  setCheckboxes(`m_def_typ_c2_${i}`, f["Defect-Type (Cup2)"]);
  document.getElementById(`m_def_int_c3_${i}`).value = f["Defect-Intensity (Cup3)"] || "None";
  setCheckboxes(`m_def_typ_c3_${i}`, f["Defect-Type (Cup3)"]);

  document.getElementById(`m_ov_note_${i}`).value = f["Overall-Notes"] || "";
  document.getElementById(`m_ov_neg_${i}`).value = f["Overall-Negative"] || "";
  setCheckboxes(`m_roast_pos_${i}`, f["Possible Roasting point"]);
  setCheckboxes(`m_roast_rec_${i}`, f["Roasting point Recommendation"]);

  document.getElementById(`m_shortDesc_${i}`).value = f["Short description"] || "";
  document.getElementById(`m_priceNote_${i}`).value = f["Price list Notes"] || "";
  document.getElementById(`m_comm_${i}`).value = f["Sensory Quality Comment"] || "";

  updateMultiLabel(`m_ac_type_${i}_pop`, `m_ac_type_btn_${i}`, 'Acidity 종류');
  updateMultiLabel(`m_def_typ_ov_${i}_pop`, `m_def_typ_ov_btn_${i}`, 'Defect 종류');
  updateMultiLabel(`m_def_typ_c1_${i}_pop`, `m_def_typ_c1_btn_${i}`, 'Defect 종류');
  updateMultiLabel(`m_def_typ_c2_${i}_pop`, `m_def_typ_c2_btn_${i}`, 'Defect 종류');
  updateMultiLabel(`m_def_typ_c3_${i}_pop`, `m_def_typ_c3_btn_${i}`, 'Defect 종류');
  updateMultiLabel(`m_roast_pos_${i}_pop`, `m_roast_pos_btn_${i}`, 'Roasting point 선택');
  updateMultiLabel(`m_roast_rec_${i}_pop`, `m_roast_rec_btn_${i}`, 'Roasting point 선택');
}

function setCheckboxes(name, commaStr) {
  const arr = commaStr ? commaStr.split(',').map(s => s.trim()) : [];
  document.querySelectorAll(`input[name="${name}"]`).forEach(cb => {
    cb.checked = arr.includes(cb.value);
  });
}
