<script>
// ==========================================
// 초기화 및 UI 로직
// ==========================================
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('cup_date').value = new Date().toISOString().substring(0, 10);
  buildDefectBlocks();
  buildCuppingScores();
  setupInteractions();
  loadDraftList(); // 임시저장 목록 불러오기 추가
  
  // 모든 폼 인터랙션 시 실시간 연산기 업데이트
  document.getElementById('cuppingForm').addEventListener('input', updateRealtimePreview);
  document.getElementById('cuppingForm').addEventListener('click', updateRealtimePreview);
});

function toggleAcc(button) {
  const content = button.nextElementSibling;
  const arrow = button.querySelector('.arrow');
  if (content.classList.contains('closed')) {
    content.classList.remove('closed');
    arrow.textContent = '▲';
  } else {
    content.classList.add('closed');
    arrow.textContent = '▼';
  }
}

// 버튼 단일/다중 선택 이벤트 리스너 
function setupInteractions() {
  document.addEventListener('click', function(e) {
    if(e.target && e.target.classList.contains('select-single')) {
      const parent = e.target.parentElement;
      parent.querySelectorAll('.select-single').forEach(b => b.classList.remove('active-btn'));
      e.target.classList.add('active-btn');
    }
    if(e.target && e.target.classList.contains('select-multi')) {
      e.target.classList.toggle('active-btn');
    }
  });
}

// 데이터 추출 유틸 함수
function getValSingle(groupId) {
  const parent = document.getElementById(groupId);
  if(!parent) return "";
  const active = parent.querySelector('.active-btn');
  return active ? active.innerText.trim() : "";
}
function getValMulti(groupId) {
  const parent = document.getElementById(groupId);
  if(!parent) return "";
  const actives = parent.querySelectorAll('.active-btn');
  let arr = [];
  actives.forEach(b => arr.push(b.innerText.trim()));
  return arr.join(', ');
}
function val(id) { 
  return document.getElementById(id) ? document.getElementById(id).value.trim() : ""; 
}

const SCORE_FIELDS = [
  { id: 'sc_clean', label: 'Clean Cup', key: 'Clean Cup' },
  { id: 'sc_sweet', label: 'Sweetness', key: 'Sweetness' },
  { id: 'sc_acid', label: 'Acidity', key: 'Acidity' },
  { id: 'sc_mouth', label: 'Mouthfeel', key: 'Mouthfeel' },
  { id: 'sc_flav', label: 'Flavour', key: 'Flavour' },
  { id: 'sc_after', label: 'Aftertaste', key: 'Aftertaste' },
  { id: 'sc_bal', label: 'Balance', key: 'Balance' },
  { id: 'sc_over', label: 'Overall', key: 'Overall' }
];

function buildCuppingScores() {
  const container = document.getElementById('score-container');
  container.innerHTML = '';
  SCORE_FIELDS.forEach(field => {
    container.innerHTML += `
      <div class="flex items-center justify-between p-2 border-b border-gray-100">
        <label class="text-sm font-bold text-gray-700 w-24">${field.label}</label>
        <div class="flex items-center gap-1">
          <button type="button" onclick="stepScore('${field.id}', -0.25)" class="w-8 h-8 bg-gray-100 rounded text-gray-600 font-bold active:bg-gray-300">-</button>
          <input type="number" id="${field.id}" value="6.00" step="0.25" min="0" max="8" class="w-16 text-center font-mono border rounded p-1 text-sm bg-purple-50 text-purple-900 font-bold outline-none" onchange="calcTotalScore(); updateRealtimePreview();">
          <button type="button" onclick="stepScore('${field.id}', 0.25)" class="w-8 h-8 bg-gray-100 rounded text-gray-600 font-bold active:bg-gray-300">+</button>
        </div>
      </div>
    `;
  });
  calcTotalScore();
}

function stepScore(id, amount) {
  const input = document.getElementById(id);
  let v = parseFloat(input.value) || 0;
  v += amount;
  if(v < 0) v = 0; if(v > 8) v = 8;
  input.value = v.toFixed(2);
  calcTotalScore();
  updateRealtimePreview();
}

function calcTotalScore() {
  let total = 36;
  SCORE_FIELDS.forEach(f => {
    total += parseFloat(val(f.id)) || 0;
  });
  document.getElementById('cup_total_score').innerText = total.toFixed(2);
}

// ==========================================
// 실시간 연산기 (Unrefined & Negative)
// ==========================================
function updateRealtimePreview() {
  // 1. Unrefined Notes
  let unrefined = [];
  
  let tNote = val('cup_fl_top'), eNote = val('cup_fl_extra');
  let flavStr = "";
  if(tNote) flavStr += `[Main Flavor] ${tNote}`;
  else if(eNote) flavStr += `[Main Flavor] ${eNote}`;
  if(tNote && eNote) flavStr += ` [Extra Flavor] ${eNote}`;
  if(flavStr) unrefined.push(flavStr.trim());

  let acInt = getValSingle('grp_ac_int'), acType = getValMulti('grp_ac_type');
  if(acInt || acType) unrefined.push(`[Acidity] ${acInt} ${acType}`.trim());

  let swInt = getValSingle('grp_sw_int');
  if(swInt) unrefined.push(`[Sweetness] ${swInt}`);

  let mfInt = getValSingle('grp_mf_int'), mfNote = val('cup_mf_note');
  if(mfInt || mfNote) unrefined.push(`[Mouthfeel] ${mfInt} ${mfNote}`.trim());

  let afInt = getValSingle('grp_af_int'), afNote = val('cup_af_note');
  if(afInt || afNote) unrefined.push(`[Aftertaste] ${afInt} ${afNote}`.trim());

  let cleanScore = parseFloat(val('sc_clean') || 0);
  let balScore = parseFloat(val('sc_bal') || 0);
  let ovNote = val('cup_ov_note');
  
  if(cleanScore >= 6.5 || balScore >= 6.5 || ovNote) {
    let ovArr = [];
    if(cleanScore >= 6.5) ovArr.push("Clean");
    if(balScore >= 6.5) ovArr.push(cleanScore >= 6.5 ? "Well balanced" : "Balanced");
    if(ovNote) ovArr.push(ovNote);
    unrefined.push(`[Overall] ` + ovArr.join(", "));
  }
  // 공백 결합이 아닌 줄바꿈(\n) 결합으로 변경
  document.getElementById('preview_unrefined').value = unrefined.join('\n');

  // 2. Negative Notes
  let negative = [];
  if(val('cup_fl_neg')) negative.push(`[Flavour] ${val('cup_fl_neg')}`);
  if(val('cup_af_neg')) negative.push(`[Aftertaste] ${val('cup_af_neg')}`);
  if(val('cup_mf_neg')) negative.push(`[Mouthfeel] ${val('cup_mf_neg')}`);
  if(val('cup_ov_neg')) negative.push(`[Overall] ${val('cup_ov_neg')}`);
  
  let defInt = getValSingle('grp_def_int_ov'), defType = getValMulti('grp_def_typ_ov');
if(defInt && defInt !== "None") {
    let dStr = `[Defect] ${defInt}${defType ? ', ' + defType : ''}`.trim();
    negative.push(dStr);
  }
  document.getElementById('preview_negative').value = negative.join('\n');
}

// ==========================================
// 데이터 수집 및 서버 전송 (Airtable 헤더 매핑)
// ==========================================
function getCuppingPayload(status) {
  let payload = { 
    formType: "cupping", 
    status: status || "Completed",
    rowId: currentDraftRowId,
    fields: {} 
  };
  
  // G1
  payload.fields["Coffee Name"] = val('cup_name');
  payload.fields["Lot Code"] = val('cup_lotCode');
  payload.fields["Lot Number"] = val('cup_lotNum');
  payload.fields["Cupping Date"] = val('cup_date');
  payload.fields["Roasting Profile"] = val('cup_roastProfile');
  payload.fields["Roaster"] = getValSingle('group_roaster');

  // G2 (Defects - Overall, Cup1, Cup2, Cup3)
  ['ov', 'c1', 'c2', 'c3'].forEach(id => {
    let block = document.getElementById('grp_def_int_' + id).parentElement.parentElement;
    payload.fields[block.dataset.kint] = getValSingle('grp_def_int_' + id);
    payload.fields[block.dataset.ktyp] = getValMulti('grp_def_typ_' + id);
  });

  // G3 (Scores)
  SCORE_FIELDS.forEach(f => {
    payload.fields[f.key] = val(f.id);
  });
  payload.fields["Score Detail"] = document.getElementById('cup_total_score').innerText; // 총점

  // G4 (Notes)
  payload.fields["Flavour-Intensity"] = getValSingle('grp_fl_int');
  payload.fields["Main Flavour-Top Notes"] = val('cup_fl_top');
  payload.fields["Flavour-Extra Notes"] = val('cup_fl_extra');
  payload.fields["Flavour-Negative"] = val('cup_fl_neg');

  payload.fields["Aftertaste-Intensity"] = getValSingle('grp_af_int');
  payload.fields["Aftertaste-Notes"] = val('cup_af_note');
  payload.fields["Aftertaste-Negative"] = val('cup_af_neg');

  payload.fields["Acidity-Intensity"] = getValSingle('grp_ac_int');
  payload.fields["Acidity-Type"] = getValMulti('grp_ac_type');

  payload.fields["Sweetness-Intensity"] = getValSingle('grp_sw_int');

  payload.fields["Mouthfeel-Intensity"] = getValSingle('grp_mf_int');
  payload.fields["Mouthfeel-Notes"] = val('cup_mf_note');
  payload.fields["Mouthfeel-Negative"] = val('cup_mf_neg');

  payload.fields["Overall-Notes"] = val('cup_ov_note');
  payload.fields["Overall-Negative"] = val('cup_ov_neg');

  // G5
  payload.fields["Possible Roasting point"] = getValMulti('grp_roast_pos');
  payload.fields["Roasting point Recommendation"] = getValMulti('grp_roast_rec');
  payload.fields["Sensory Quality Comment"] = val('cup_qualityComm');
  payload.fields["Short description"] = val('cup_shortDesc');
  payload.fields["Price list Notes"] = val('cup_priceNote');
  
  // Realtime Texts (에어테이블에 계산값이 그대로 전송되도록)
  payload.fields["Unrefined Notes"] = val('preview_unrefined');
  payload.fields["Negative Notes"] = val('preview_negative');

  return payload;
}

// 임시저장 (Status: Draft)
function saveDraft() {
  const data = getCuppingPayload("Draft");
  if(!data.fields["Coffee Name"]) {
    alert("Coffee Name을 먼저 입력해주세요.");
    return;
  }
  sendToServer(data, "💾 시트에 임시저장되었습니다.");
}

// 검사 완료 (Status: Completed)
function submitForm() {
  const data = getCuppingPayload("Completed");
  if(!data.fields["Coffee Name"]) {
    alert("필수 항목(Coffee Name)을 입력해주세요.");
    return;
  }
  if(!confirm("🚀 검사를 완료하시겠습니까?\n완료 처리된 데이터는 앱에서 수정할 수 없습니다.")) {
    return;
  }
  sendToServer(data, "🚀 검사가 완료 처리되었습니다!");
}

// 공통 전송 함수
function sendToServer(payload, successMsg) {
  const btn = event ? event.target : null;
  const originText = btn ? btn.innerText : "";
  if(btn) { btn.innerText = "⏳ 처리 중..."; btn.disabled = true; }

  fetch(GOOGLE_WEB_APP_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).then(() => {
    alert(successMsg);
    if(btn) { btn.innerText = originText; btn.disabled = false; }
    
    // 검사 완료된 경우 폼 초기화
    if(payload.status === "Completed") {
      currentDraftRowId = null;
      document.getElementById('cuppingForm').reset();
      clearAllActiveButtons();
      buildCuppingScores();
      updateRealtimePreview();
    }
    
    // 1.5초 후 시트 반영 상태 반영하여 임시저장 목록 갱신
    setTimeout(loadDraftList, 1500);
  }).catch(e => {
    alert("오류가 발생했습니다. 네트워크 상태를 확인하세요.");
    if(btn) { btn.innerText = originText; btn.disabled = false; }
  });
}

// 구글 시트에서 Status가 Draft인 데이터 목록 불러오기
async function loadDraftList() {
  const select = document.getElementById('draftSelect');
  if(!select) return;
  select.innerHTML = '<option value="">-- 불러오는 중... --</option>';

  try {
    const res = await fetch(`${GOOGLE_WEB_APP_URL}?formType=cupping&action=getDrafts`);
    const data = await res.json();
    
    select.innerHTML = '<option value="">-- 새로 작성하기 --</option>';
    loadedDraftsCache = (data && data.drafts) ? data.drafts : [];

    loadedDraftsCache.forEach(draft => {
      const opt = document.createElement('option');
      opt.value = draft.rowId;
      
      const cName = draft.fields["Coffee Name"] || "이름 없음";
      const cDate = draft.fields["Cupping Date"] || "";
      const cLot = draft.fields["Lot Code"] ? ` (${draft.fields["Lot Code"]})` : "";
      
      opt.textContent = `📂 ${cName} - ${cDate}${cLot}`;
      select.appendChild(opt);
    });

    if(currentDraftRowId) {
      select.value = currentDraftRowId;
    }
  } catch(e) {
    select.innerHTML = '<option value="">-- 목록 불러오기 실패 --</option>';
    console.error("Draft 목록 로딩 실패:", e);
  }
}

// 선택한 임시저장 데이터를 폼에 복원
function loadSelectedDraft(rowId) {
  if(!rowId) {
    currentDraftRowId = null;
    document.getElementById('cuppingForm').reset();
    clearAllActiveButtons();
    buildCuppingScores();
    updateRealtimePreview();
    return;
  }

  currentDraftRowId = parseInt(rowId);
  const draft = loadedDraftsCache.find(d => d.rowId === currentDraftRowId);
  if(!draft) return;

  const f = draft.fields || {};

  document.getElementById('cup_name').value = f["Coffee Name"] || "";
  document.getElementById('cup_lotCode').value = f["Lot Code"] || "";
  document.getElementById('cup_lotNum').value = f["Lot Number"] || "";
  document.getElementById('cup_date').value = f["Cupping Date"] || new Date().toISOString().substring(0, 10);
  document.getElementById('cup_roastProfile').value = f["Roasting Profile"] || "";
  
  setValSingle('group_roaster', f["Roaster"]);

  const defBlocks = [
    {id: 'ov', kInt: 'Defect-Intensity', kTyp: 'Defect-Type'},
    {id: 'c1', kInt: 'Defect-Intensity (Cup1)', kTyp: 'Defect-Type (Cup1)'},

    {id: 'c3', kInt: 'Defect-Intensity (Cup3)', kTyp: 'Defect-Type (Cup3)'}
  ];
  defBlocks.forEach(b => {
    setValSingle('grp_def_int_' + b.id, f[b.kInt] || "None");
    setValMulti('grp_def_typ_' + b.id, f[b.kTyp] || "");
  });

  SCORE_FIELDS.forEach(sf => {
    if(f[sf.key] !== undefined) {
      const input = document.getElementById(sf.id);
      if(input) input.value = parseFloat(f[sf.key]).toFixed(2);
    }
  });
  calcTotalScore();

  setValSingle('grp_fl_int', f["Flavour-Intensity"]);
  document.getElementById('cup_fl_top').value = f["Main Flavour-Top Notes"] || "";
  document.getElementById('cup_fl_extra').value = f["Flavour-Extra Notes"] || "";
  document.getElementById('cup_fl_neg').value = f["Flavour-Negative"] || "";

  setValSingle('grp_af_int', f["Aftertaste-Intensity"]);
  document.getElementById('cup_af_note').value = f["Aftertaste-Notes"] || "";
  document.getElementById('cup_af_neg').value = f["Aftertaste-Negative"] || "";

  setValSingle('grp_ac_int', f["Acidity-Intensity"]);
  setValMulti('grp_ac_type', f["Acidity-Type"]);

  setValSingle('grp_sw_int', f["Sweetness-Intensity"]);

  setValSingle('grp_mf_int', f["Mouthfeel-Intensity"]);
  document.getElementById('cup_mf_note').value = f["Mouthfeel-Notes"] || "";
  document.getElementById('cup_mf_neg').value = f["Mouthfeel-Negative"] || "";

  document.getElementById('cup_ov_note').value = f["Overall-Notes"] || "";
  document.getElementById('cup_ov_neg').value = f["Overall-Negative"] || "";

  setValMulti('grp_roast_pos', f["Possible Roasting point"]);
  setValMulti('grp_roast_rec', f["Roasting point Recommendation"]);
  document.getElementById('cup_qualityComm').value = f["Sensory Quality Comment"] || "";
  document.getElementById('cup_shortDesc').value = f["Short description"] || "";
  document.getElementById('cup_priceNote').value = f["Price list Notes"] || "";

  updateRealtimePreview();
}

// 다중 총점 자동 계산 함수
function calcMultiTotal(i) {

  fields.forEach(f => {
    const el = document.getElementById(`m_sc_${f}_${i}`);
    if(el) sum += parseFloat(el.value) || 0;
  });
  const totalEl = document.getElementById(`m_total_${i}`);
  if(totalEl) totalEl.innerText = sum.toFixed(2);
}

// 💡 image_d7047b 레이아웃 정밀 반영 렌더러 (색상 제거 및 분리 적용)

// 멀티셀렉트 팝오버 토글
function toggleMultiSelect(id) {
  const pop = document.getElementById(id + '_pop');
  if(!pop) return;
  document.querySelectorAll('[id$="_pop"]').forEach(el => {
    if(el !== pop) el.classList.add('hidden');
  });
  pop.classList.toggle('hidden');
}

// Acidity 종류 체크박스 생성
function acidityTypeBoxes(i) {
  const types = ["Citric", "Malic", "Tartaric", "Lactic", "Acetic", "Phosphoric", "Butyric", "Succinic", "Other"];
  return types.map(t => `
    <label class="flex items-center gap-1.5 text-xs text-gray-800 cursor-pointer hover:bg-gray-100 p-0.5 rounded">
      <input type="checkbox" name="m_ac_type_${i}" value="${t}" class="rounded text-purple-600 focus:ring-0"> ${t}
    </label>
  `).join('');
}

// Defect 종류 체크박스 생성
function defectTypeBoxes(i, cupKey) {
  const types = ["Quaker", "Papery", "Woody", "Phenol", "Over-Fermented", "Leathery", "Stinker", "Others"];
  return types.map(t => `
    <label class="flex items-center gap-1.5 text-xs text-gray-800 cursor-pointer hover:bg-gray-100 p-0.5 rounded">
      <input type="checkbox" name="m_def_typ_${cupKey}_${i}" value="${t}" class="rounded text-purple-600 focus:ring-0"> ${t}
    </label>
  `).join('');
}

// Roasting Point 체크박스 생성
function roastPointBoxes(i, typeKey) {
  const points = ["Light", "Medium-Light", "Medium", "Medium-Dark", "Dark"];
  return points.map(p => `
    <label class="flex items-center gap-1.5 text-xs text-gray-800 cursor-pointer hover:bg-gray-100 p-0.5 rounded">
      <input type="checkbox" name="m_roast_${typeKey}_${i}" value="${p}" class="rounded text-purple-600 focus:ring-0"> ${p}
    </label>
  `).join('');
}

// 다중 총점 자동 연산 (36 + 각 항목 점수)
function calcMultiTotal(i) {
  const fields = ['clean', 'sweet', 'acid', 'mouth', 'flav', 'after', 'bal', 'over'];
  let sum = 36;
  fields.forEach(f => {
    const el = document.getElementById(`m_sc_${f}_${i}`);
    if(el) sum += parseFloat(el.value) || 0;
  });
  const totalEl = document.getElementById(`m_total_${i}`);
  if(totalEl) totalEl.innerText = sum.toFixed(2);
}

// 1단계 switchMode 오버라이드 연동
const origSwitchMode = window.switchMode;
window.switchMode = function(mode) {
  origSwitchMode(mode);
  if (mode === 'multi') {
    const container = document.getElementById('multiGridContainer');
    if (!container.children.length) {
      renderMultiGrid();
    }
  }
};
